<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>INJAZ Lebanon — Career Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root{--org:#286478;--org-d:#1e4d5e;--org-l:rgba(40,100,120,0.09);--accent:#00a0b4;--dark:#001428;--gray:#4a6a7a;--light:#f2f8fa;--white:#fff;--border:rgba(40,100,120,0.14);--radius:16px;--card-shadow:0 2px 16px rgba(0,20,40,0.08)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Plus Jakarta Sans',system-ui,sans-serif;background:#f0f7f9;color:#001428;min-height:100vh}
button,input,select,textarea{font-family:inherit}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
@keyframes wave{0%,100%{transform:scaleY(.3)}50%{transform:scaleY(1.3)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.fade-up{animation:fadeUp .3s ease forwards}
.hidden{display:none!important}

/* Layout */
#app{display:flex;flex-direction:column;min-height:100vh}
#banner{background:linear-gradient(90deg,#001428,#286478,#00a0b4);color:rgba(255,255,255,.9);text-align:center;padding:5px 12px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.14em}
#nav{position:sticky;top:0;z-index:100;background:rgba(255,255,255,.95);backdrop-filter:blur(16px);border-bottom:2px solid rgba(40,100,120,0.15)}
#nav-inner{max-width:1200px;margin:0 auto;padding:0 24px;display:flex;justify-content:space-between;align-items:center;height:60px}
.logo{display:flex;align-items:center;gap:9px;cursor:pointer}
.logo-icon{width:30px;height:30px;background:var(--org);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:14px}
.logo-text{font-weight:800;font-size:16px;letter-spacing:-.02em}
.logo-text span{color:var(--org)}
#nav-links{display:flex;align-items:center;gap:22px}
.nav-btn{background:none;border:none;cursor:pointer;font-size:13px;font-weight:600;color:var(--gray);transition:color .15s;padding:0}
.nav-btn.active{color:var(--org)}
.nav-btn:hover{color:#1a1a1a}
.nav-user{display:flex;align-items:center;gap:10px;padding-left:16px;border-left:1px solid var(--border)}
.avatar{width:30px;height:30px;background:var(--org);border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:13px;flex-shrink:0}
.logout-btn{background:none;border:none;cursor:pointer;color:#9ca3af;font-size:17px;line-height:1}
#main{flex:1;max-width:1200px;margin:0 auto;padding:36px 24px 60px;width:100%}
footer{background:#001428;border-top:none;padding:20px 24px;text-align:center;font-size:12px;color:rgba(255,255,255,.55)}

/* Cards */
.card{background:var(--white);border-radius:24px;border:1px solid var(--border);box-shadow:var(--card-shadow);padding:24px}

/* Inputs */
.inp{width:100%;padding:11px 15px;background:var(--light);border:1px solid var(--border);border-radius:11px;font-size:13.5px;outline:none;transition:border-color .2s,box-shadow .2s}
.inp:focus{border-color:var(--org);box-shadow:0 0 0 3px var(--org-l)}
textarea.inp{resize:vertical;line-height:1.6}
select.inp{cursor:pointer}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:7px;padding:11px 20px;background:var(--org);color:#fff;border:none;border-radius:11px;font-weight:700;font-size:13.5px;cursor:pointer;transition:background .15s,transform .1s,box-shadow .15s}
.btn:hover{background:var(--org-d);transform:translateY(-1px)}
.btn:active{transform:none}
.btn:disabled{background:#a8c8d2;cursor:not-allowed;transform:none}
.btn-dark{background:var(--dark);color:#fff}.btn-dark:hover{background:#222}
.btn-ghost{background:var(--light);color:#374151;border:1px solid var(--border)}.btn-ghost:hover{background:#f3f4f6}
.btn-pill{border-radius:999px}
.btn-sm{padding:7px 14px;font-size:12px;border-radius:9px}
.btn-full{width:100%;justify-content:center;padding:13px}

/* Badge */
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:999px;font-weight:700;font-size:11px}
.badge-orange{background:#e6f4f7;color:#286478}
.badge-green{background:#f0fdf4;color:#15803d}
.badge-blue{background:#eff6ff;color:#1d4ed8}
.badge-purple{background:#f5f3ff;color:#7c3aed}
.badge-gray{background:#f3f4f6;color:#6b7280}

/* Spinner */
.spin{width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}

/* Grid helpers */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.flex{display:flex}.flex-col{flex-direction:column}.gap8{gap:8px}.gap12{gap:12px}.gap16{gap:16px}.gap20{gap:20px}.gap24{gap:24px}
.between{justify-content:space-between}.center-x{justify-content:center}.center-y{align-items:center}.wrap{flex-wrap:wrap}
.bold{font-weight:700}.text-sm{font-size:12px}.text-gray{color:var(--gray)}.text-org{color:var(--org)}
.mb4{margin-bottom:4px}.mb8{margin-bottom:8px}.mb12{margin-bottom:12px}.mb16{margin-bottom:16px}.mb20{margin-bottom:20px}
.mt8{margin-top:8px}.mt12{margin-top:12px}.mt16{margin-top:16px}.mt20{margin-top:20px}

/* Form label */
.field{margin-bottom:16px}
.field-label{display:block;font-weight:700;font-size:12px;margin-bottom:6px;color:#374151}
.field-label .ar{font-weight:400;font-size:11px;color:var(--gray)}
.field-label .req{color:#ef4444;margin-left:2px}

/* Radio group */
.radio-group{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px}
.radio-group.col{flex-direction:column}
.radio-label{display:flex;align-items:center;gap:7px;padding:8px 14px;border-radius:10px;border:1px solid var(--border);background:#fff;cursor:pointer;font-size:12.5px;font-weight:500;color:#374151;transition:all .15s;flex:1;min-width:120px}
.radio-label.col-item{flex:unset;min-width:unset}
.radio-label input{accent-color:var(--org);width:14px;height:14px}
.radio-label.checked{border-color:var(--org);background:var(--org-l);font-weight:700;color:var(--org)}

/* Step tabs */
.step-tabs{display:flex;gap:6px}
.step-tab{flex:1;padding:8px 4px;border-radius:9px;border:1px solid var(--border);background:#fff;font-size:10px;font-weight:700;color:var(--gray);cursor:pointer;text-align:center;transition:all .2s}
.step-tab .step-num{display:block;font-size:13px;margin-bottom:2px}
.step-tab.active{border-color:var(--org);background:var(--org-l);color:var(--org)}
.step-tab.done{background:#f9fafb;color:#9ca3af}
.section-header{display:flex;align-items:center;gap:12px;margin:28px 0 18px;padding-bottom:12px;border-bottom:2px solid var(--org-l)}
.section-num{width:32px;height:32px;background:var(--org);border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:14px;flex-shrink:0}
.section-en{font-weight:800;font-size:16px}
.section-ar{font-size:11px;color:#9ca3af;margin-top:1px}

/* Progress bar */
.progress-bar{width:120px;height:5px;background:#f3f4f6;border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:var(--org);border-radius:3px;transition:width .4s ease}

/* KPI card */
.kpi-card{padding:24px}
.kpi-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;margin-bottom:12px}
.kpi-label{font-size:10px;font-weight:700;color:#9ca3af;text-transform:uppercase;letter-spacing:.12em;margin-bottom:5px}
.kpi-value{font-size:28px;font-weight:800}

/* Job card */
.job-card{padding:20px;cursor:pointer;transition:transform .15s,box-shadow .15s}
.job-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,0.09)}
.co-logo{width:44px;height:44px;background:linear-gradient(135deg,#286478,#00a0b4);border-radius:12px;display:flex;align-items:center;justify-content:center;font-weight:800;color:#9ca3af;font-size:17px;flex-shrink:0}

/* Chat bubble */
.bubble-bot{max-width:76%;padding:9px 13px;font-size:13px;line-height:1.6;white-space:pre-wrap;border-radius:4px 14px 14px 14px;background:#fff;border:1px solid var(--border);color:#374151}
.bubble-user{max-width:76%;padding:9px 13px;font-size:13px;line-height:1.6;white-space:pre-wrap;border-radius:14px 4px 14px 14px;background:rgba(242,125,38,0.12);border:1px solid rgba(242,125,38,0.2);color:#92400e}

/* Bar chart */
.bar-row{margin-bottom:14px}
.bar-track{height:7px;background:#f3f4f6;border-radius:4px;overflow:hidden}
.bar-fill{height:100%;background:linear-gradient(90deg,var(--org),#FF9A56);border-radius:4px}

/* Hero */
.hero-grid{display:grid;grid-template-columns:1fr 1fr;gap:48px;align-items:center;padding-top:16px}
.hero-img{border-radius:28px;aspect-ratio:4/3;background:#001428;display:flex;align-items:center;justify-content:center;box-shadow:0 24px 64px rgba(0,20,40,.25);transform:rotate(2deg);overflow:hidden}
.hero-float{position:absolute;bottom:-12px;left:-16px;background:#fff;padding:14px 16px;border-radius:18px;box-shadow:0 8px 28px rgba(0,0,0,.12);border:1px solid var(--border);transform:rotate(-2deg);min-width:180px}
.stats-bar{background:#111;border-radius:48px;padding:48px 40px;display:grid;grid-template-columns:repeat(4,1fr);gap:20px;text-align:center;position:relative;overflow:hidden}
.stats-bar::before{content:'';position:absolute;top:0;right:0;width:260px;height:260px;background:rgba(242,125,38,.18);border-radius:50%;filter:blur(70px)}

/* Filter pills */
.pill{padding:6px 14px;border-radius:999px;border:1px solid var(--border);background:#fff;color:var(--gray);font-weight:600;font-size:12px;cursor:pointer;transition:all .15s}
.pill.active{border-color:var(--org);background:var(--org-l);color:var(--org)}

/* Demo banner info box */
.demo-btns{display:flex;gap:6px;margin-top:8px}

/* Voice coach avatar */
.coach-avatar{width:88px;height:88px;border-radius:50%;background:linear-gradient(135deg,#001428,#286478);display:flex;align-items:center;justify-content:center;font-size:34px;transition:border-color .3s,box-shadow .3s;border:2px solid transparent}
.wave-bars{display:flex;align-items:center;gap:3px;height:26px}
.wave-bar{width:3px;border-radius:2px;background:var(--org);opacity:.2;transition:height .15s,opacity .3s}
.wave-bar.active{opacity:.8;animation:wave var(--dur,.6s) ease-in-out var(--delay,0s) infinite alternate}

/* Transcript */
#transcript{height:220px;overflow-y:auto;background:#f9fafb;border-radius:18px;border:1px solid var(--border);padding:14px;display:flex;flex-direction:column;gap:10px}
.typing-dots{display:flex;gap:4px;align-items:center;padding:10px 13px;background:#fff;border-radius:4px 14px 14px 14px;border:1px solid var(--border);width:fit-content}
.typing-dot{width:5px;height:5px;border-radius:50%;background:var(--org);animation:blink .8s ease-in-out infinite}

/* Notification bar for registration */
.reg-banner{padding:16px 18px;background:#fff7ed;border-radius:16px;border:1px solid rgba(242,125,38,.2);display:flex;align-items:center;gap:14px}

/* Summary box */
.summary-box{margin-top:18px;padding:16px;background:#f9fafb;border-radius:14px;border:1px solid var(--border)}
.summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:12px;margin-top:10px}
.summary-item span{color:#9ca3af;margin-right:4px}

/* Black sidebar card */
.dark-card{background:#111;border-radius:24px;padding:20px;position:relative;overflow:hidden;color:#fff}
.dark-card::before{content:'';position:absolute;top:0;right:0;width:80px;height:80px;background:rgba(242,125,38,.3);border-radius:50%;filter:blur(35px)}
.dark-tool-btn{width:100%;display:flex;align-items:center;gap:10px;padding:10px;background:rgba(0,160,180,.12);border-radius:12px;border:none;cursor:pointer;margin-bottom:7px;color:#fff;text-align:left;font-family:inherit;transition:background .2s}
.dark-tool-btn:hover{background:rgba(0,160,180,.22)}
.dark-tool-icon{width:30px;height:30px;background:rgba(255,255,255,.1);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
</style>

</head>

// ── Nav ───────────────────────────────────────────────────────
function renderNav() {
  const nav = el('nav-links');
  if (!nav) return;
  let html = '';
  if (currentUser) {
    const links = [
      {l:'Dashboard',v:'dashboard'},
      // Job seekers: full access. Employers/admins: read-only job board
      ...(currentUser.role==='job_seeker'?[
        {l:'Job Board',v:'jobs'},
        {l:'CV AI',v:'cv-analyzer'},
        {l:'Interview',v:'interview'},
        {l:'My Forms',v:'my-forms'},
        {l:'Profile',v:'profile'}
      ]:[]),
      ...(currentUser.role==='employer'?[
        {l:'Job Board',v:'jobs'},
        {l:'Post Job',v:'post-job'},
        {l:'Apprentice Feedback',v:'emp-feedback'},
        {l:'Profile',v:'profile'}
      ]:[]),
      ...(currentUser.role==='trainer'?[
        {l:'Job Board',v:'jobs'},
        {l:'Assess Participants',v:'performance'},
        {l:'Form Responses',v:'admin-forms'}
      ]:[]),
      ...(currentUser.role==='admin'?[
        {l:'Job Board',v:'jobs'},
        {l:'Form Responses',v:'admin-forms'},
        {l:'AI Report',v:'admin-report'}
      ]:[]),
    ];
    links.forEach(({l,v}) => {
      html += `<button class="nav-btn ${currentView===v?'active':''}" onclick="setView('${v}')">${l}</button>`;
    });
    const roleColor = currentUser.role==='admin'?'blue':currentUser.role==='employer'?'green':currentUser.role==='trainer'?'purple':'orange';
    html += `<div class="nav-user">
      <div class="avatar">${currentUser.name[0]}</div>
      <span class="bold" style="font-size:13px">${currentUser.name}</span>
      ${badge(currentUser.role.replace('_',' '), roleColor)}
      <button class="logout-btn" onclick="logout()" title="Log out">⎋</button>
    </div>`;
  } else {
    html = `<button class="nav-btn" onclick="setView('login')">Login</button>
      <button class="btn btn-pill" style="padding:7px 16px;font-size:13px;box-shadow:0 4px 12px rgba(242,125,38,0.3)" onclick="setView('register')">Join Program</button>`;
  }
  nav.innerHTML = html;
}

function logout() {
  window.speechSynthesis?.cancel();
  // Full logout handled by Supabase layer (defined below)
  const token = localStorage.getItem('injaz_token');
  if(token && typeof sb !== 'undefined' && SUPABASE_URL !== 'https://YOUR_PROJECT.supabase.co') sb.signOut(token);
  localStorage.removeItem('injaz_token'); localStorage.removeItem('injaz_refresh'); localStorage.removeItem('injaz_user');
  currentUser = null; currentView = 'home'; renderNav(); renderMain();
}

// ── Main router ───────────────────────────────────────────────
function renderMain() {
  const main = el('main');
  if (!main) return;
  main.innerHTML = '';
  main.className = 'fade-up';
  void main.offsetWidth;

  if (currentView === 'home')         { renderHome(main); return; }
  if (currentView === 'login')        { renderLogin(main); return; }
  if (currentView === 'register')     { renderRegister(main); return; }
  if (!currentUser) { setView('login'); return; }

  switch(currentView) {
    case 'dashboard':
      if (currentUser.role==='job_seeker') renderSeekerDash(main);
      else if (currentUser.role==='employer') renderEmployerDash(main);
      else if (currentUser.role==='trainer') renderTrainerDash(main);
      else renderAdminDash(main);
      break;
    case 'jobs':         renderJobBoard(main); break;
    case 'cv-analyzer':  renderCV(main); break;
    case 'cover-letter': renderCoverLetter(main); break;
    case 'interview':    renderInterview(main); break;
    case 'profile':      renderProfile(main); break;
    case 'post-job':     renderPostJob(main); break;
    case 'baseline':     renderMyForms(main); break;
    case 'baseline-form':  renderBaseline(main); break;
    case 'performance':  renderPerformance(main); break;
    case 'endline':      renderEndline(main); break;
    case 'admin-forms':  renderAdminForms(main); break;
    case 'admin-report': renderAdminReport(main); break;
    case 'my-forms':     renderMyForms(main); break;
    case 'app-baseline': renderAppBaseline(main); break;
    case 'app-endline':  renderAppEndline(main); break;
    case 'emp-feedback': renderEmployerFeedback(main); break;
    default: renderHome(main);
  }
}

let selectedRole = 'job_seeker';
function pickRole(btn) {
  selectedRole = btn.dataset.role;
  document.querySelectorAll('.role-btn').forEach(b => {
    const active = b === btn;
    b.style.borderColor = active ? 'var(--org)' : 'var(--border)';
    b.style.background = active ? 'var(--org-l)' : '#fff';
    b.style.color = active ? 'var(--org)' : '#9ca3af';
  });
}

            }

function openCoverLetter(jid) {
  const j = JOBS.find(x=>x.id===jid);
  if (j) { initJobDesc = `Job: ${j.title}\\
Company: ${j.company}\\
Description: ${j.desc}`; }
  setView('cover-letter');
}
async function doMatch(jid) {
  const btn = el('match-btn-'+jid);
  if (!btn) return;
  btn.disabled = true; btn.innerHTML = '⏳';
  await sleep(800 + Math.random()*500);
  const score = 52 + Math.floor(Math.random()*46);
  const color = score > 70 ? '#16a34a' : '#d97706';
  const mEl = el('match-'+jid);
  if (mEl) mEl.innerHTML = `<span style="font-weight:700;color:${color}">✓ ${score}% Match</span>`;
  const rEl = el('match-reason-'+jid);
  if (rEl) rEl.innerHTML = `<div style="padding:8px 12px;background:var(--org-l);border-radius:10px;border:1px solid rgba(242,125,38,.15);font-size:12px;color:#374151;margin-bottom:10px"><strong style="color:var(--org)">✨ </strong>Your skills align well with this role's requirements.</div>`;
  if (btn) { btn.innerHTML = ''; btn.style.display='none'; }
}
async function doApply(jid) {
  const btn = el('apply-btn-'+jid);
  if (!btn || btn.textContent === '✓ Applied') return;
  const apps = getApplied();
  if (!apps.includes(jid)) {
    apps.push(jid);
    localStorage.setItem('injaz_apps_'+currentUser.id, JSON.stringify(apps));
  }
  btn.style.background = '#dcfce7'; btn.style.color = '#16a34a'; btn.textContent = '✓ Applied';
}

function ciLang(l) {
  CI.lang=l;
  var en=el('ci-en'), ar=el('ci-ar');
  if(!en||!ar) return;
  en.style.borderColor = l==='en' ? 'var(--org)' : 'var(--border)';
  en.style.background  = l==='en' ? 'var(--org-l)' : '#fff';
  en.style.color       = l==='en' ? 'var(--org)' : 'var(--gray)';
  ar.style.borderColor = l==='ar' ? 'var(--org)' : 'var(--border)';
  ar.style.background  = l==='ar' ? 'var(--org-l)' : '#fff';
  ar.style.color       = l==='ar' ? 'var(--org)' : 'var(--gray)';
  if(CI.recog) CI.recog.lang = l==='ar' ? 'ar-LB' : 'en-US';
}

function ciLoadVoices() {
  if(!window.speechSynthesis) return;
  function fill() {
    var all = window.speechSynthesis.getVoices();
    if(!all.length) return;
    var pref = all.filter(function(v){ return /google|samantha|karen|zira|hazel/i.test(v.name); });
    CI.voices = pref.concat(all.filter(function(v){ return pref.indexOf(v)<0; }));
    CI.voice = CI.voices[0]||null;
    var sel = el('ci-vsel');
    if(sel) sel.innerHTML = CI.voices.map(function(v){
      return '<option value="'+v.name.replace(/"/g,'&quot;')+'">'+v.name+' ('+v.lang+')</option>';
    }).join('');
  }
  fill();
  window.speechSynthesis.onvoiceschanged = fill;
}

function ciPickVoice(name) {
  for(var i=0;i<CI.voices.length;i++) { if(CI.voices[i].name===name){ CI.voice=CI.voices[i]; return; } }
}

function ciInitSR() {
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR) { return; }
  CI.recog = new SR();
  CI.recog.continuous = false;
  CI.recog.interimResults = true;
  CI.recog.lang = 'en-US';
  CI.recog.onresult = function(e) {
    var fin='', intr='';
    for(var i=e.resultIndex; i<e.results.length; i++) {
      var t = e.results[i][0].transcript;
      if(e.results[i].isFinal) fin+=t; else intr+=t;
    }
    var ie = el('ci-int'); if(ie) ie.textContent = intr ? '... '+intr : '';
    if(fin) { var ie2=el('ci-int'); if(ie2) ie2.textContent=''; ciAnswer(fin.trim()); }
  };
  CI.recog.onerror = function() { ciSS('idle'); };
  CI.recog.onend   = function() { if(CI.state==='listening') ciSS('idle'); };
}

function ciSS(s) {
  CI.state = s;
  var av=el('ci-av'), dot=el('ci-dot'), st=el('ci-st'), mic=el('ci-mic');
  var C = {speaking:'var(--org)', listening:'#22c55e', thinking:'#818cf8', idle:'#374151'};
  var E = {speaking:'&#128483;', listening:'&#128066;', thinking:'&#129300;', idle:'&#129302;'};
  var SE = {speaking:'Coach speaking...', listening:'Listening...', thinking:'Thinking...', idle: CI.started ? 'Your turn — click mic' : 'Ready'};
  var SA = {speaking:'عم يحكي...', listening:'عم يسمع...', thinking:'عم يفكر...', idle: CI.started ? 'دورك' : 'جاهز'};
  var labels = CI.lang==='ar' ? SA : SE;
  if(av){ av.innerHTML=E[s]||'&#129302;'; av.style.borderColor=s!=='idle'?C[s]:'transparent'; av.style.boxShadow=s==='speaking'?'0 0 22px rgba(242,125,38,.4)':''; }
  if(dot) dot.style.background = C[s];
  if(st)  st.textContent = labels[s]||'';
  if(mic){ mic.disabled=s==='thinking'||s==='speaking'; mic.style.background=s==='listening'?'rgba(239,68,68,.1)':'#f9fafb'; mic.style.borderColor=s==='listening'?'#ef4444':'rgba(0,0,0,.1)'; mic.innerHTML=s==='listening'?'&#9209;':'&#127897;'; }
  var act = s==='speaking' || s==='listening';
  for(var i=0;i<12;i++) {
    var b=el('cw'+i);
    if(b){ b.style.height=act?(3+Math.abs(Math.sin(i*.8))*15)+'px':'3px'; b.style.opacity=act?'0.85':'0.15'; b.style.background=s==='listening'?'#22c55e':'var(--org)'; }
  }
}

function ciSpeak(text, cb) {
  if(CI.muted || !window.speechSynthesis) { ciSS('idle'); if(cb) cb(); return; }
  try{ window.speechSynthesis.cancel(); }catch(e){}
  setTimeout(function() {
    var synth = window.speechSynthesis;
    var voices = synth.getVoices();
    var lc = CI.lang==='ar' ? 'ar' : 'en';
    var best = null;
    for(var i=0;i<voices.length;i++) { if(voices[i].lang.toLowerCase().indexOf(lc)===0){ best=voices[i]; break; } }
    if(!best) best = CI.voice || (voices.length ? voices[0] : null);
    var u = new SpeechSynthesisUtterance(text);
    if(best) u.voice = best;
    u.lang   = CI.lang==='ar' ? 'ar-LB' : 'en-US';
    u.rate   = 0.92;
    u.pitch  = 1.0;
    u.volume = 1.0;
    var done = false;
    function fin() {
      if(done) return; done=true;
      if(CI.kaTmr){ clearInterval(CI.kaTmr); CI.kaTmr=null; }
      if(CI.safeTmr){ clearTimeout(CI.safeTmr); CI.safeTmr=null; }
      ciSS('idle');
      if(cb) cb();
    }
    CI.kaTmr = setInterval(function(){ if(synth.speaking){ synth.pause(); synth.resume(); } }, 10000);
    CI.safeTmr = setTimeout(fin, Math.max(8000, text.split(' ').length*600)+5000);
    u.onstart = function() { ciSS('speaking'); };
    u.onend   = fin;
    u.onerror = function(ev) { if(ev.error!=='interrupted'&&ev.error!=='canceled') console.warn('TTS:',ev.error); fin(); };
    synth.speak(u);
    setTimeout(function(){ if(CI.state==='thinking') ciSS('speaking'); }, 2500);
  }, 120);
}

function ciAsk(withFb) {
  ciSS('thinking'); ciTyping();
  setTimeout(function() {
    ciNoTyping();
    var text = '';
    if(withFb && CI.qIdx>0) {
      var fb = CI.lang==='ar' ? FB_AR : FB_EN;
      text = fb[Math.floor(Math.random()*fb.length)] + '\n\n';
    }
    var idx = Math.min(CI.qIdx, CI.questions.length-1);
    text += CI.questions[idx];
    CI.qIdx++;
    ciBubble('bot', text);
    ciProg();
    ciSpeak(text, function(){ ciSS('idle'); });
  }, withFb ? 850 : 400);
}

function ciAnswer(text) {
  if(!text) return;
  CI.started = true;
  ciSS('thinking');
  ciBubble('user', text);
  ciAsk(true);
}

function ciStart() {
  var te = el('ci-title');
  var title = te ? te.value.trim() : '';
  if(!title) {
    if(te) te.style.borderColor = '#ef4444';
    var er = el('ci-err'); if(er) er.style.display='block';
    if(te) te.focus();
    return;
  }
  var er = el('ci-err'); if(er) er.style.display='none';
  if(te) te.style.borderColor = '';
  CI.jobTitle = title;
  CI.questions = CI.lang==='ar' ? iqAR(title) : iqEN(title);
  CI.qIdx = 0; CI.started = false;
  var setup=el('ci-setup'), sess=el('ci-session');
  if(setup) setup.style.display = 'none';
  if(sess)  sess.style.display  = 'block';
  var jt=el('ci-jtag'); if(jt) jt.textContent = title;
  var lt=el('ci-ltag'); if(lt) lt.textContent  = CI.lang==='ar' ? 'Arabic' : 'English';
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  var sw = el('ci-srwarn'); if(sw) sw.style.display = SR ? 'none' : 'block';
  if(CI.recog) CI.recog.lang = CI.lang==='ar' ? 'ar-LB' : 'en-US';
  var chat = el('ci-chat'); if(chat) chat.innerHTML = '';
  ciProg(); ciSS('thinking'); ciTyping();
  setTimeout(function() {
    ciNoTyping(); CI.started=true;
    var q = CI.questions[0]; CI.qIdx=1;
    ciBubble('bot', q); ciProg();
    ciSpeak(q, function(){ ciSS('idle'); });
  }, 1000);
}

function ciReset() {
  try{ window.speechSynthesis && window.speechSynthesis.cancel(); }catch(e){}
  try{ CI.recog && CI.recog.abort(); }catch(e){}
  if(CI.kaTmr){ clearInterval(CI.kaTmr); CI.kaTmr=null; }
  if(CI.safeTmr){ clearTimeout(CI.safeTmr); CI.safeTmr=null; }
  CI.qIdx=0; CI.started=false; CI.questions=[];
  var setup=el('ci-setup'), sess=el('ci-session');
  if(setup) setup.style.display='flex';
  if(sess)  sess.style.display='none';
  ciSS('idle');
}

function ciMic() {
  if(!CI.recog) return;
  if(CI.state==='speaking'){ try{window.speechSynthesis.cancel();}catch(e){} ciSS('idle'); return; }
  if(CI.state==='listening'){ try{CI.recog.stop();}catch(e){} ciSS('idle'); }
  else { try{ CI.recog.abort(); CI.recog.start(); ciSS('listening'); }catch(e){ ciSS('idle'); } }
}

function ciMute() {
  CI.muted = !CI.muted;
  if(CI.muted) try{ window.speechSynthesis && window.speechSynthesis.cancel(); }catch(e){}
  var b = el('ci-mute');
  if(b){ b.textContent=CI.muted?'Unmute Coach':'Mute Coach'; b.style.background=CI.muted?'#f3f4f6':'var(--org-l)'; b.style.color=CI.muted?'#374151':'var(--org)'; }
}

function ciProg() {
  var p=el('ci-prog'); if(!p) return;
  var total=CI.questions.length-1, h='';
  for(var i=0;i<total;i++)
    h+='<div style="width:26px;height:5px;border-radius:3px;background:'+(i<CI.qIdx?'var(--org)':'#e5e7eb')+';transition:background .4s"></div>';
  p.innerHTML=h;
}

function ciBubble(role, text) {
  var ph=el('ci-ph'); if(ph) ph.remove();
  var chat=el('ci-chat'); if(!chat) return;
  var d=document.createElement('div');
  d.style.cssText='display:flex;justify-content:'+(role==='bot'?'flex-start':'flex-end');
  d.innerHTML='<div class="bubble-'+role+'">'+text.replace(/\n/g,'<br>')+'</div>';
  chat.appendChild(d); chat.scrollTop=chat.scrollHeight;
}
function ciTyping() {
  var ph=el('ci-ph'); if(ph) ph.remove();
  var chat=el('ci-chat'); if(!chat) return;
  var d=document.createElement('div'); d.id='ci-typ'; d.style.display='flex';
  d.innerHTML='<div class="typing-dots"><div class="typing-dot" style="animation-delay:0s"></div><div class="typing-dot" style="animation-delay:.2s"></div><div class="typing-dot" style="animation-delay:.4s"></div></div>';
  chat.appendChild(d); chat.scrollTop=chat.scrollHeight;
}
function ciNoTyping() { var t=el('ci-typ'); if(t) t.remove(); }

function saveEmployerMapping() {
  var d = {};
  ['proj','org','cfn','cmn','cln','pos','email','phone','web','fb','li','ig','email2','geo','countries','type','size','sector','years','fields','comments'].forEach(function(k){
    var e=document.getElementById('em-'+k); if(e) d[k]=e.value;
  });
  ['hours','rest','contracts','hiring','convert'].forEach(function(k){
    var r=document.querySelector('input[name="em-'+k+'"]:checked'); if(r) d[k]=r.value;
  });
  ['benefits','diversity','safety','opptypes','activities'].forEach(function(k){
    var cbs=document.querySelectorAll('input[name="em-'+k+'"]:checked');
    d[k]=Array.from(cbs).map(function(x){return x.value;});
  });
  document.querySelectorAll('input[name="em-gov-pres"]').forEach(function(cb,i){ d['gp'+i]=cb.checked; });
  document.querySelectorAll('input[name="em-gov-main"]').forEach(function(cb,i){ d['gm'+i]=cb.checked; });
  regData.companyName=d.org; regData.industry=d.sector;
  localStorage.setItem('injaz_reg_'+currentUser.id, JSON.stringify(regData));
  saveFormResponse('employer_mapping', d);
  var s=el('em-success'); if(s){ s.style.display='block'; window.scrollTo(0,0); }
  setTimeout(function(){ setView('dashboard'); }, 1500);
}


function renderRegStep(c) {
  const prog = Math.round((regStep/4)*100);
  const stepNames = [['Personal','معلومات شخصية'],['Education','التعليم'],['Employment','العمل'],['Motivation','الدافع']];

  c.innerHTML = `
  <div style="max-width:720px;margin:0 auto">
    <!-- Header -->
    <div class="card mb16" style="padding:18px 24px">
      <div class="flex between center-y mb12">
        <div>
          <h2 style="font-size:19px;font-weight:800;margin-bottom:2px">Register for Job Search Club 2025</h2>
          <p style="color:#9ca3af;font-size:11px">سجل الان في نادي البحث عن العمل</p>
        </div>
        <div style="text-align:right">
          <div style="font-size:11px;color:#9ca3af;margin-bottom:4px">Step ${regStep} of 4</div>
          <div class="progress-bar"><div class="progress-fill" style="width:${prog}%"></div></div>
        </div>
      </div>
      <div class="step-tabs">
        ${stepNames.map(([l,ar],i)=>`<button class="step-tab ${regStep===i+1?'active':i+1<regStep?'done':''}" onclick="regStep=${i+1};renderRegStep(el('main'))">
          <span class="step-num">${i+1<regStep?'✓':i+1}</span>${l}
        </button>`).join('')}
      </div>
    </div>

    <!-- Form -->
    <div class="card" id="reg-form">
      ${regStep===1 ? renderStep1() : regStep===2 ? renderStep2() : regStep===3 ? renderStep3() : renderStep4()}
      
      <!-- Nav -->
      <div class="flex between" style="margin-top:24px;padding-top:18px;border-top:1px solid var(--border)">
        ${regStep>1 ? `<button class="btn btn-ghost" onclick="regStep--;renderRegStep(el('main'))">← Back</button>` : '<div></div>'}
        ${regStep<4
          ? `<button class="btn" onclick="saveRegStep();regStep++;renderRegStep(el('main'))" style="box-shadow:0 4px 14px rgba(242,125,38,0.25)">Next →</button>`
          : `<button class="btn" id="submit-reg-btn" onclick="submitReg()">Submit Registration ✓</button>`
        }
      </div>
    </div>
  </div>`;

  // Attach dynamic handlers after render
  attachRegHandlers();
}

function fieldLabel(en, ar, req=false) {
  return `<label class="field-label">${en} <span class="ar">${ar}</span>${req?'<span class="req">*</span>':''}</label>`;
}
function radioGroup(name, options, saved, col=false) {
  return `<div class="radio-group ${col?'col':''}">
    ${options.map(([v,l])=>`<label class="radio-label ${col?'col-item':''} ${saved===v?'checked':''}" onclick="regData['${name}']='${v}';this.closest('.radio-group').querySelectorAll('.radio-label').forEach(x=>x.classList.remove('checked'));this.classList.add('checked')">
      <input type="radio" name="${name}" value="${v}" ${saved===v?'checked':''}> ${l}
    </label>`).join('')}
  </div>`;
}

function attachRegHandlers() {
  // Sync all .reg-inp fields to regData on change
  document.querySelectorAll('.reg-inp').forEach(inp => {
    inp.addEventListener('change', () => { regData[inp.dataset.key] = inp.value; });
    inp.addEventListener('input', () => { regData[inp.dataset.key] = inp.value; });
  });
  // Conditional shows
  const natRadios = document.querySelectorAll('[name="nationality"]');
  natRadios.forEach(r => r.addEventListener('change', () => {
    const v = r.value;
    const now = el('id-wrap'); const unhcr = el('unhcr-wrap'); const other = el('nat-other-wrap');
    if(now) now.style.display = (v==='Lebanese'||v==='PRL') ? '' : 'none';
    if(unhcr) unhcr.style.display = (v==='Syrian'||v==='PRS') ? '' : 'none';
    if(other) other.style.display = v==='Other' ? '' : 'none';
  }));
  const disRadios = document.querySelectorAll('[name="disability"]');
  disRadios.forEach(r => r.addEventListener('change', () => {
    const w = el('disability-wrap'); if(w) w.style.display = r.value==='Yes' ? '' : 'none';
  }));
  const empRadios = document.querySelectorAll('[name="empStatus"]');
  empRadios.forEach(r => r.addEventListener('change', () => {
    const w = el('unemp-wrap'); if(w) w.style.display = r.value==='Unemployed' ? '' : 'none';
  }));
  const jobRadios = document.querySelectorAll('[name="lookingJob"]');
  jobRadios.forEach(r => r.addEventListener('change', () => {
    const w = el('search-dur-wrap'); if(w) w.style.display = r.value==='Yes' ? '' : 'none';
  }));
  const vocRadios = document.querySelectorAll('[name="vocTraining"]');
  vocRadios.forEach(r => r.addEventListener('change', () => {
    const w = el('voc-wrap'); if(w) w.style.display = r.value==='Yes' ? '' : 'none';
  }));
}

function saveRegStep() {
  document.querySelectorAll('.reg-inp').forEach(inp => {
    if (inp.dataset.key) regData[inp.dataset.key] = inp.value;
  });
  localStorage.setItem('injaz_reg_'+currentUser.id, JSON.stringify(regData));
}
async function submitReg() {
  saveRegStep();
  const btn = el('submit-reg-btn');
  btn.disabled=true; btn.innerHTML=spinner()+' Submitting…';
  await sleep(800);
  btn.innerHTML='✓ Submitted!'; btn.style.background='#dcfce7'; btn.style.color='#16a34a';
  setTimeout(()=>setView('dashboard'),1000);
}

// ── FORM BUILDER HELPERS ──────────────────────────────────────
function formSection(num, title, titleAR, fields) {
  return '<div style="display:flex;flex-direction:column;gap:14px">' +
    '<div style="display:flex;align-items:center;gap:10px;padding-bottom:10px;border-bottom:2px solid var(--border)">' +
      '<div style="width:28px;height:28px;border-radius:50%;background:var(--org);color:#fff;font-weight:800;font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0">'+num+'</div>' +
      '<div><div style="font-weight:800;font-size:15px">'+title+'</div><div style="font-size:12px;color:var(--gray)">'+titleAR+'</div></div>' +
    '</div>' +
    fields.join('') +
  '</div>';
}
function formRow(fields) {
  return '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px">' + fields.join('') + '</div>';
}
function formField(label, id, type, placeholder, value) {
  return '<div><label class="field-label">'+label+'</label>' +
    (type==='textarea'
      ? '<textarea class="inp" id="'+id+'" rows="3" placeholder="'+placeholder+'">'+value+'</textarea>'
      : '<input class="inp" id="'+id+'" type="'+type+'" placeholder="'+placeholder+'" value="'+String(value||'').replace(/"/g,'&quot;')+'"/>') +
  '</div>';
}
function formSelect(label, id, options, value) {
  return '<div><label class="field-label">'+label+'</label>' +
    '<select class="inp" id="'+id+'">' +
    options.map(function(o){ return '<option value="'+o+'"'+(o===value?' selected':'')+'>'+o+'</option>'; }).join('') +
    '</select></div>';
}
function formRadio(label, name, options, value) {
  return '<div><label class="field-label" style="margin-bottom:8px;display:block">'+label+'</label>' +
    '<div style="display:flex;flex-wrap:wrap;gap:10px">' +
    options.map(function(o){
      return '<label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:13px;padding:8px 14px;border-radius:10px;border:1.5px solid '+(o[0]===value?'var(--org)':'var(--border)')+';background:'+(o[0]===value?'var(--org-l)':'#fff')+'">' +
        '<input type="radio" name="'+name+'" value="'+o[0]+'"'+(o[0]===value?' checked':'')+' style="accent-color:var(--org)"> '+o[1]+'</label>';
    }).join('') +
    '</div></div>';
}
function formCheckGroup(label, name, options, values) {
  var vals = Array.isArray(values) ? values : [];
  return '<div><label class="field-label" style="margin-bottom:8px;display:block">'+label+'</label>' +
    '<div style="display:flex;flex-wrap:wrap;gap:10px">' +
    options.map(function(o){
      var checked = vals.indexOf(o) >= 0;
      return '<label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:13px;padding:8px 14px;border-radius:10px;border:1.5px solid '+(checked?'var(--org)':'var(--border)')+';background:'+(checked?'var(--org-l)':'#fff')+'">' +
        '<input type="checkbox" name="'+name+'" value="'+o+'"'+(checked?' checked':'')+' style="accent-color:var(--org)"> '+o+'</label>';
    }).join('') +
    '</div></div>';
}



// ── SKILL MATRIX HELPER ───────────────────────────────────────
function skillMatrix(prefix, sections, savedData) {
  var cols = ['Very Confident واثق جداً','Confident واثق','Somehow Confident واثق إلى حد ما','Not Confident غير واثق'];
  var html = '<div style="overflow-x:auto">';
  sections.forEach(function(sec) {
    html += '<div style="margin-bottom:18px">';
    html += '<div style="font-weight:700;font-size:13px;color:var(--org);margin-bottom:8px;padding:6px 10px;background:var(--org-l);border-radius:8px">' + sec.title + '</div>';
    html += '<table style="width:100%;border-collapse:collapse;font-size:12px">';
    html += '<thead><tr style="background:#f9fafb">';
    html += '<th style="text-align:left;padding:8px 10px;font-weight:700;border-bottom:2px solid var(--border);min-width:200px">Skill</th>';
    cols.forEach(function(col) {
      html += '<th style="text-align:center;padding:8px 6px;font-weight:700;border-bottom:2px solid var(--border);min-width:72px;font-size:11px">' + col + '</th>';
    });
    html += '</tr></thead><tbody>';
    sec.rows.forEach(function(row, idx) {
      var key = prefix + '_' + row.id;
      html += '<tr style="background:' + (idx%2===0?'#fff':'#f9fafb') + ';border-bottom:1px solid var(--border)">';
      html += '<td style="padding:8px 10px;font-size:12px">' + row.label + '</td>';
      [1,2,3,4].forEach(function(v) {
        var checked = savedData && savedData[row.id] == v ? ' checked' : '';
        html += '<td style="text-align:center;padding:8px"><input type="radio" name="' + key + '" value="' + v + '"' + checked + ' style="width:15px;height:15px;accent-color:var(--org)"></td>';
      });
      html += '</tr>';
    });
    html += '</tbody></table></div>';
  });
  html += '</div>';
  return html;
}

function satisfactionMatrix(prefix, rows, cols, savedData) {
  var html = '<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:12px">';
  html += '<thead><tr style="background:#f9fafb">';
  html += '<th style="text-align:left;padding:8px 10px;font-weight:700;border-bottom:2px solid var(--border);min-width:200px">Statement</th>';
  cols.forEach(function(col) {
    html += '<th style="text-align:center;padding:8px 6px;font-weight:700;border-bottom:2px solid var(--border);min-width:80px;font-size:11px">' + col + '</th>';
  });
  html += '</tr></thead><tbody>';
  rows.forEach(function(row, idx) {
    var key = prefix + '_sat_' + idx;
    html += '<tr style="background:' + (idx%2===0?'#fff':'#f9fafb') + ';border-bottom:1px solid var(--border)">';
    html += '<td style="padding:8px 10px;font-size:12px">' + row + '</td>';
    cols.forEach(function(_, ci) {
      var v = ci+1;
      var checked = savedData && savedData['sat_'+idx] == v ? ' checked' : '';
      html += '<td style="text-align:center;padding:8px"><input type="radio" name="' + key + '" value="' + v + '"' + checked + ' style="width:15px;height:15px;accent-color:var(--org)"></td>';
    });
    html += '</tr>';
  });
  html += '</tbody></table></div>';
  return html;
}

function collectAllData() {
  // Collect and summarize all platform data into a structured object
  var data = {
    baselines:       getAllFormResponses('baseline'),
    performances:    getAllFormResponses('performance'),
    endlines:        getAllFormResponses('endline'),
    appBaselines:    getAllFormResponses('app_baseline'),
    appEndlines:     getAllFormResponses('app_endline'),
    empFeedbacks:    getAllFormResponses('employer_feedback'),
    empMappings:     getAllFormResponses('employer_mapping')
  };

  // ── Training baseline analysis
  var bl = data.baselines.map(function(r){ return r.data||{}; });
  var training = {
    total: bl.length,
    genderF: bl.filter(function(d){ return d.gender==='female'; }).length,
    genderM: bl.filter(function(d){ return d.gender==='male'; }).length,
    lebanese: bl.filter(function(d){ return d.nat==='lebanese'; }).length,
    syrian:   bl.filter(function(d){ return d.nat==='syrian'; }).length,
    unemployed: bl.filter(function(d){ return d.status==='Unemployed عاطل'; }).length,
    hasCV:    bl.filter(function(d){ return d.s4==='yes'; }).length,
    hasCL:    bl.filter(function(d){ return d.s5==='yes'; }).length,
    hasClearGoal: bl.filter(function(d){ return d.s3==='yes'; }).length,
    governorates: countValues(bl, 'gov'),
    sectors:      countValues(bl, 'sector'),
    dreamJobs:    bl.map(function(d){ return d.dream; }).filter(Boolean),
    centers:      countValues(bl, 'cloc'),
    avgRatings:   avgMatrixRatings(bl, ['r1','r2','r3','r4','r5','r6','r7','r8','r9','r10','r11'])
  };

  // ── Endline analysis (compare vs baseline)
  var el2 = data.endlines.map(function(r){ return r.data||{}; });
  var endline = {
    total: el2.length,
    foundJob:       el2.filter(function(d){ return d.job==='yes'; }).length,
    hasInterviews:  el2.filter(function(d){ return d.job==='interview'; }).length,
    wouldRecommend: el2.filter(function(d){ return d.recommend==='yes'; }).length,
    programHelped:  el2.filter(function(d){ return d.helped==='yes'; }).length,
    avgRatings:     avgMatrixRatings(el2, ['r1','r2','r3','r4','r5','r6','r7','r8'])
  };

  // ── Performance assessment
  var pf = data.performances.map(function(r){ return r.data||{}; });
  var performance = {
    total: pf.length,
    ready:     pf.filter(function(d){ return d.ready==='Ready مستعد'||d.ready==='Highly Ready مستعد جداً'; }).length,
    updatedCV: pf.filter(function(d){ return d.cv==='yes'; }).length,
    applied:   pf.filter(function(d){ return d.applied==='yes'; }).length
  };

  // ── Apprentice analysis
  var ab = data.appBaselines.map(function(r){ return r.data||{}; });
  var ae = data.appEndlines.map(function(r){ return r.data||{}; });
  var apprentice = {
    total: ab.length,
    endlineTotal: ae.length,
    sectors: countValues(ab, 'sector'),
    governorates: countValues(ab, 'gov'),
    projects: countValues(ab, 'proj'),
    preAvg:  avgMatrixRatings(ab, ['c1','c2','c3','t1','t2','t3','p1','p2','p3','d1','d2','d3','m1','m2','m3','a1','a2','a3','s1','s2','s3','j1','j2','j3']),
    postAvg: avgMatrixRatings(ae, ['c1','c2','c3','t1','t2','t3','p1','p2','p3','d1','d2','d3','m1','m2','m3','a1','a2','a3','s1','s2','s3','j1','j2','j3'])
  };

  // ── Employer feedback
  var ef = data.empFeedbacks.map(function(r){ return r.data||{}; });
  var empFeedback = {
    total: ef.length,
    wouldHire:    ef.filter(function(d){ return d.hire==='offered'||d.hire==='considering'; }).length,
    recommend:    ef.filter(function(d){ return d.rec==='yes'; }).length,
    verySatisfied: ef.filter(function(d){ return d.sat==='5'||d.sat==='4'; }).length
  };

  // ── Employer mapping
  var em = data.empMappings.map(function(r){ return r.data||{}; });
  var employers = {
    total: em.length,
    hiring:   em.filter(function(d){ return d.hiring==='active'; }).length,
    planning: em.filter(function(d){ return d.hiring==='planning'; }).length,
    sectors:  countValues(em, 'sector'),
    types:    countValues(em, 'type'),
    sizes:    countValues(em, 'size'),
    withApprenticeship: em.filter(function(d){ return d.opptypes && d.opptypes.indexOf('Apprenticeships تدريب عملي')>=0; }).length,
    willingRoundtable:  em.filter(function(d){ return d.activities && d.activities.indexOf('Employers Roundtable طاولة أصحاب العمل')>=0; }).length
  };

  return { training: training, endline: endline, performance: performance, apprentice: apprentice, empFeedback: empFeedback, employers: employers };
}

function countValues(arr, key) {
  var counts = {};
  arr.forEach(function(d){ var v=d[key]; if(v) counts[v]=(counts[v]||0)+1; });
  return counts;
}

function avgMatrixRatings(arr, keys) {
  if(!arr.length) return 0;
  var total=0, count=0;
  arr.forEach(function(d){ keys.forEach(function(k){ var v=parseFloat(d[k]); if(!isNaN(v)){ total+=v; count++; } }); });
  return count ? (total/count).toFixed(2) : 0;
}

function topEntries(obj, n) {
  return Object.keys(obj).sort(function(a,b){ return obj[b]-obj[a]; }).slice(0,n||3).map(function(k){ return k + ' (' + obj[k] + ')'; }).join(', ');
}

  try {
    var response = await fetch('https://api.anthropic.com/v1/messages', {

      })
    });
    var result = await response.json();

    content.innerHTML = '<div style="color:#ef4444;padding:16px">Error: ' + e.message + '. Make sure the Anthropic API key is configured.</div>';
    output.style.display = 'flex';
  }

  btn.disabled = false;
  btn.innerHTML = '✨ Generate AI Report';
}

function formatReport(text) {
  // Convert markdown-like headings and structure to styled HTML
  var html = text
    .replace(/^#{1,2} (.+)$/gm, '<h2 style="font-size:18px;font-weight:800;margin:24px 0 10px;color:#1a1a2e;border-bottom:2px solid var(--border);padding-bottom:8px">$1</h2>')
    .replace(/^#{3,4} (.+)$/gm, '<h3 style="font-size:15px;font-weight:700;margin:18px 0 8px;color:var(--org)">$1</h3>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/^\* (.+)$/gm, '<li style="margin:4px 0 4px 20px">$1</li>')
    .replace(/^- (.+)$/gm, '<li style="margin:4px 0 4px 20px">$1</li>')
    .replace(/^(\d+)\. (.+)$/gm, '<li style="margin:4px 0 4px 20px"><strong>$1.</strong> $2</li>')
    .replace(/\n\n/g, '</p><p style="margin:10px 0">')
    .replace(/\n/g, '<br>');
  return '<p style="margin:10px 0">' + html + '</p>';
}

function copyReport() {
  if(window._lastReport) {
    navigator.clipboard && navigator.clipboard.writeText(window._lastReport);
    var btn = event.target; btn.textContent = '✓ Copied!';
    setTimeout(function(){ btn.textContent = '📋 Copy'; }, 2000);
  }
}

function printReport() {
  var content = el('rpt-content');
  if(!content) return;
  var w = window.open('','_blank');
  w.document.write('<html><head><title>INJAZ Lebanon Report</title><style>body{font-family:sans-serif;max-width:800px;margin:40px auto;line-height:1.7;color:#1a1a2e}h2{border-bottom:2px solid #eee;padding-bottom:8px}li{margin:4px 0}</style></head><body>');
  w.document.write('<h1>INJAZ Lebanon — Program Report</h1>');
  w.document.write('<p style="color:#666;font-size:13px">Generated: ' + new Date().toLocaleString() + '</p><hr>');
  w.document.write(content.innerHTML);
  w.document.write('</body></html>');
  w.document.close();
  w.print();
}

function regenerateReport() {
  generateReport();
}



// ── SUPABASE INTEGRATION (production — no demo accounts) ─────────────────────────────────────
// ── SUPABASE CONFIG ───────────────────────────────────────────
// These values are replaced by your real Supabase project values
// Get them from: supabase.com → your project → Settings → API
const SUPABASE_URL = window.SUPABASE_URL || 'https://YOUR_PROJECT.supabase.co';
const SUPABASE_ANON_KEY = window.SUPABASE_ANON_KEY || 'YOUR_ANON_KEY';

// ── SUPABASE CLIENT (lightweight, no npm needed) ──────────────
const sb = {
  headers: {
    'Content-Type': 'application/json',
    'apikey': SUPABASE_ANON_KEY,
    'Authorization': 'Bearer ' + SUPABASE_ANON_KEY
  },

  // Set auth token after login
  setAuth(token) {
    this.headers['Authorization'] = 'Bearer ' + token;
  },

  // Generic REST call
  async rest(method, path, body) {
    try {
      const res = await fetch(SUPABASE_URL + path, {
        method,
        headers: this.headers,
        body: body ? JSON.stringify(body) : undefined
      });
      return await res.json();
    } catch(e) {
      console.error('Supabase error:', e);
      return null;
    }
  },

  // Auth calls
  async signUp(email, password, meta) {
    const res = await fetch(SUPABASE_URL + '/auth/v1/signup', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_ANON_KEY },
      body: JSON.stringify({ email, password, data: meta })
    });
    return await res.json();
  },

  async signIn(email, password) {
    const res = await fetch(SUPABASE_URL + '/auth/v1/token?grant_type=password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_ANON_KEY },
      body: JSON.stringify({ email, password })
    });
    return await res.json();
  },

  async signOut(token) {
    await fetch(SUPABASE_URL + '/auth/v1/logout', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_ANON_KEY, 'Authorization': 'Bearer ' + token }
    });
  },

  // Database calls
  async insert(table, data) {
    return await this.rest('POST', '/rest/v1/' + table, data);
  },

  async upsert(table, data, onConflict) {
    const url = '/rest/v1/' + table + (onConflict ? '?on_conflict=' + onConflict : '');
    const res = await fetch(SUPABASE_URL + url, {
      method: 'POST',
      headers: { ...this.headers, 'Prefer': 'resolution=merge-duplicates,return=representation' },
      body: JSON.stringify(data)
    });
    return await res.json();
  },

  async select(table, query) {
    return await this.rest('GET', '/rest/v1/' + table + '?' + (query||'select=*'));
  },

  async selectOne(table, query) {
    const res = await this.select(table, query + '&limit=1');
    return Array.isArray(res) ? res[0] : null;
  },

  async update(table, data, query) {
    return await this.rest('PATCH', '/rest/v1/' + table + '?' + query, data);
  }
};

// ── SUPABASE AUTH FUNCTIONS ───────────────────────────────────
async function doLogin() {
  const btn = el('login-btn');
  const email = el('l-email').value.trim();
  const pass = el('l-pass').value;
  if(!email || !pass) return;
  btn.disabled = true;
  btn.innerHTML = spinner() + ' Signing in…';

  // Try Supabase auth first
  if(SUPABASE_URL !== 'https://YOUR_PROJECT.supabase.co') {
    const res = await sb.signIn(email, pass);
    if(res.access_token) {
      sb.setAuth(res.access_token);
      localStorage.setItem('injaz_token', res.access_token);
      localStorage.setItem('injaz_refresh', res.refresh_token);
      // Get user profile
      const profile = await sb.selectOne('profiles', 'select=*&user_id=eq.' + res.user.id);
      currentUser = {
        id: res.user.id,
        email: res.user.email,
        name: profile?.name || res.user.email.split('@')[0],
        role: profile?.role || 'job_seeker',
        company: profile?.company || ''
      };
      localStorage.setItem('injaz_user', JSON.stringify(currentUser));
      setView('dashboard');
      return;
    } else {
      el('login-err').textContent = '⚠ ' + (res.error_description || res.msg || 'Invalid credentials.');
      el('login-err').style.display = 'block';
      btn.disabled = false;
      btn.innerHTML = '→ Sign In';
      return;
    }
  }

  // No demo fallback — Supabase auth only
  el('login-err').textContent = '⚠ Invalid email or password.';
  el('login-err').style.display = 'block';
  btn.disabled = false;
  btn.innerHTML = '→ Sign In';
}

async function doRegister() {
  const name = el('r-name').value.trim();
  const email = el('r-email').value.trim();
  const pass = el('r-pass') ? el('r-pass').value : 'changeme123';
  if(!name || !email) return;
  const btn = el('reg-btn');
  btn.disabled = true; btn.innerHTML = spinner() + ' Creating account…';

  if(SUPABASE_URL !== 'https://YOUR_PROJECT.supabase.co') {
    const res = await sb.signUp(email, pass, { name, role: selectedRole });
    if(res.user || res.id) {
      const uid = res.user?.id || res.id;
      // Create profile row
      await sb.upsert('profiles', { user_id: uid, email, name, role: selectedRole }, 'user_id');
      currentUser = { id: uid, email, name, role: selectedRole };
      localStorage.setItem('injaz_user', JSON.stringify(currentUser));
      if(res.session) {
        sb.setAuth(res.session.access_token);
        localStorage.setItem('injaz_token', res.session.access_token);
      }
      setView('dashboard');
    } else {
      btn.disabled = false;
      btn.innerHTML = 'Create Account';
      alert(res.error_description || res.msg || 'Registration failed.');
    }
    return;
  }

  // No demo fallback — Supabase only
  btn.disabled = false;
  btn.innerHTML = 'Create Account';
  alert('Registration unavailable. Please check your connection.');
}

// Auto-restore session on page load
function restoreSession() {
  const saved = localStorage.getItem('injaz_user');
  const token = localStorage.getItem('injaz_token');
  if(saved) {
    try {
      currentUser = JSON.parse(saved);
      if(token) sb.setAuth(token);
    } catch(e) {}
  }
}

// ── SUPABASE DATA FUNCTIONS ───────────────────────────────────
// These replace the localStorage-based saveFormResponse / getAllFormResponses

async function saveFormResponse(formKey, data) {
  const uid = currentUser ? currentUser.id : 'anon';
  // Always save to localStorage as immediate cache
  const key = 'injaz_form_' + formKey + '_' + uid;
  const payload = { data, ts: new Date().toISOString(), user: currentUser?.name || '' };
  localStorage.setItem(key, JSON.stringify(payload));

  // Also save to Supabase if connected
  if(SUPABASE_URL !== 'https://YOUR_PROJECT.supabase.co') {
    await sb.upsert('form_responses', {
      user_id: uid,
      form_key: formKey,
      data: JSON.stringify(data),
      user_name: currentUser?.name || '',
      updated_at: new Date().toISOString()
    }, 'user_id,form_key');
  }
}

function getFormResponse(formKey) {
  const uid = currentUser ? currentUser.id : 'anon';
  const key = 'injaz_form_' + formKey + '_' + uid;
  try { return JSON.parse(localStorage.getItem(key) || 'null'); } catch(e) { return null; }
}

function getAllFormResponses(formKey) {
  var results = [];
  for(var i=0; i<localStorage.length; i++) {
    var k = localStorage.key(i);
    if(k && k.indexOf('injaz_form_' + formKey + '_') === 0) {
      try { results.push(JSON.parse(localStorage.getItem(k))); } catch(e) {}
    }
  }
  return results;
}

// Load all form responses from Supabase into localStorage cache
async function syncFormResponses() {
  if(SUPABASE_URL === 'https://YOUR_PROJECT.supabase.co') return;
  const isAdmin = currentUser && (currentUser.role === 'admin' || currentUser.role === 'trainer');
  const query = isAdmin
    ? 'select=*'
    : 'select=*&user_id=eq.' + currentUser.id;
  const rows = await sb.select('form_responses', query);
  if(!Array.isArray(rows)) return;
  rows.forEach(function(row) {
    const key = 'injaz_form_' + row.form_key + '_' + row.user_id;
    try {
      localStorage.setItem(key, JSON.stringify({
        data: JSON.parse(row.data),
        ts: row.updated_at,
        user: row.user_name
      }));
    } catch(e) {}
  });
}

const getSavedReg = () => { try { return JSON.parse(localStorage.getItem('injaz_reg_'+(currentUser?.id||'')) || '{}'); } catch { return {}; }};
const getApplied  = () => JSON.parse(localStorage.getItem('injaz_apps_'+(currentUser?.id||'')) || '[]');

(async function() {
  // Give the config fetch a moment to complete
  await new Promise(r => setTimeout(r, 800));
  restoreSession();
  syncFormResponses().then(() => { renderNav(); renderMain(); });
})();
